<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Swissploit Blog Redirect</title>
  <meta name="robots" content="noindex,follow" />
  <meta name="description" content="Legacy blog redirect page for the new static Swissploit blog index." />
  <link rel="canonical" href="https://swissploit.ch/blog/" />
  <script>
    (function () {
      const savedLang = localStorage.getItem("swissploit-blog-lang");
      const target = savedLang === "en" ? "/en/blog/" : "/blog/";
      window.location.replace(target);
    })();
  </script>
  <style>
    body {
      margin: 0;
      font: 16px/1.5 Inter, system-ui, sans-serif;
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: 24px;
    }
    main { max-width: 680px; text-align: center; }
  </style>
</head>
<body>
  <main>
    <h1>Weiterleitung…</h1>
    <p>Die Blog-Übersicht wurde auf eine statische URL umgestellt.</p>
    <p><a href="/blog/">Zum Blog</a></p>
  </main>
</body>
</html>
