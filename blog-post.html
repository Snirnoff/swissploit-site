<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Swissploit Blog Redirect</title>
  <meta name="robots" content="noindex,follow" />
  <meta name="description" content="Legacy blog redirect page for older Swissploit article links." />
  <link rel="canonical" href="https://swissploit.ch/blog.html" />

  <script src="/assets/blog-posts.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");
      const explicitLang = params.get("lang");
      const savedLang = localStorage.getItem("swissploit-blog-lang");
      const preferredLang = explicitLang || savedLang || "de";

      const posts = window.SWISSPLOIT_BLOG_POSTS || [];
      const match = posts.find((post) => post.id === id || post.slug === id);

      const target =
        (preferredLang === "en" && match?.urls?.en) ||
        match?.urls?.de ||
        match?.urls?.en ||
        "/blog/";

      window.location.replace(target);
    })();
  </script>

  <style>
    body {
      margin: 0;
      font: 16px/1.5 Inter, system-ui, sans-serif;
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: 24px;
    }
    main { max-width: 680px; text-align: center; }
  </style>
</head>
<body>
  <main>
    <h1>Weiterleitung…</h1>
    <p>Der Blogartikel wurde auf eine statische URL umgestellt.</p>
    <p><a href="/blog/">Zur Blog-Übersicht</a></p>
  </main>
</body>
</html>
